name: Build NixOS configurations

on:
  workflow_dispatch:

jobs:
  build-system:
    name: Build system (${{ matrix.host }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host:
          - computerone
          - portatilo
          - serverone
          - vps-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key for secrets repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
            ${{ secrets.FF_DEPLOY_KEY }}
            ${{ secrets.CALENDAR_PROXY_DEPLOY_KEY }}
            ${{ secrets.GIUOCO_DEL_DIVERTIMENTO_DEPLOY_KEY }}

      - name: Add github.com to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            # Extracted with: nix eval --json '.#nixosConfigurations.computerone.config.nix.settings.{substituters,trusted-public-keys}'
            extra-substituters = https://nix-community.cachix.org https://catppuccin.cachix.org https://install.determinate.systems https://cache.nixos.org/ https://cache.nixos-cuda.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732IysmU= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM= computerone-1:FwphMHwxn0KLInwuouQcqsNn4J5fkzJNAd4QlJa4Lk8= portatilo-1:KM4PhszcXObDUqfnN0BZNwnya6B+2br39PURy8hy6nA= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=

      - name: Build ${{ matrix.host }}
        run: |
          nix build \
            --print-build-logs \
            ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel"

  build-home:
    name: Build home (${{ matrix.host }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host:
          - portatilo
          - computerone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key for secrets repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.NIX_SECRETS_DEPLOY_KEY }}
            ${{ secrets.FF_DEPLOY_KEY }}
            ${{ secrets.CALENDAR_PROXY_DEPLOY_KEY }}
            ${{ secrets.GIUOCO_DEL_DIVERTIMENTO_DEPLOY_KEY }}

      - name: Add github.com to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            # Extracted with: nix eval --json '.#nixosConfigurations.computerone.config.nix.settings.{substituters,trusted-public-keys}'
            extra-substituters = https://nix-community.cachix.org https://catppuccin.cachix.org https://install.determinate.systems https://cache.nixos.org/ https://cache.nixos-cuda.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732IysmU= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM= computerone-1:FwphMHwxn0KLInwuouQcqsNn4J5fkzJNAd4QlJa4Lk8= portatilo-1:KM4PhszcXObDUqfnN0BZNwnya6B+2br39PURy8hy6nA= cache.nixos-cuda.org:74DUi4Ye579gUqzH4ziL9IyiJBlDpMRn9MBN8oNan9M=

      - name: Build billy@${{ matrix.host }}
        run: |
          nix build \
            --print-build-logs \
            '.#homeConfigurations."billy@${{ matrix.host }}".activationPackage'
